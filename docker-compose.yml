# Local production-style testing for the Memora AI backend.
# Copy backend/.env.example to backend/.env and fill in secrets before running.
#
# Liveness: GET /api/v1/health/live (public, no auth).
# Detailed health: GET /api/v1/health requires HEALTH_ENDPOINTS_ENABLED=true
# and an admin Bearer token (see docs/DEPLOYMENT.md).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
